# Azure DevOps Pipeline for Le Restaurant Static Website
# React/Vite frontend deployment to Azure Static Web Apps with Jest Unit Tests

trigger:
  branches:
    include:
      - main
      - F108TABLERESERVATION
  paths:
    exclude:
      - README.md
      - docs/*
      - design-plan/*
      - backend/*

pr:
  branches:
    include:
      - main
  paths:
    exclude:
      - README.md
      - docs/*
      - backend/*

variables:
  nodeVersion: '20.x'
  azureSubscription: 'le-restaurant-service-connection'

stages:
- stage: UnitTests
  displayName: 'Run Jest Unit Tests'
  jobs:
  - job: JestTests
    displayName: 'Run Jest Unit Tests'
    pool:
      vmImage: 'ubuntu-latest'
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '$(nodeVersion)'

    - script: |
        cd frontend
        npm install
        npm test -- --ci --reporters=default --reporters=jest-junit
      displayName: 'Run Jest Tests'

    - task: PublishTestResults@2
      inputs:
        testResultsFiles: 'frontend/test-results/jest/results.xml'
        testResultsFormat: 'JUnit'
        failTaskOnFailedTests: true
        testRunTitle: 'Frontend Unit Tests'
# =============================================================================
# CONTINUOUS INTEGRATION STAGE
# =============================================================================
- stage: CI
  displayName: 'Continuous Integration'
  jobs:
  - job: Build
    displayName: 'Build, Test, and Lint Frontend'
    pool:
      vmImage: 'ubuntu-latest'
    
    steps:
    # Setup Node.js Environment
    - task: NodeTool@0
      displayName: 'Setup Node.js $(nodeVersion)'
      inputs:
        versionSpec: '$(nodeVersion)'
    
    # Cache Node Modules
    - task: Cache@2
      displayName: 'Cache Node Modules'
      inputs:
        key: 'npm | "$(Agent.OS)" | frontend/package-lock.json'
        restoreKeys: |
          npm | "$(Agent.OS)"
          npm
        path: 'frontend/node_modules'
    
    # Install Dependencies
    - script: |
        cd frontend
        rm -rf node_modules package-lock.json
        npm install
      displayName: 'Clean and install dependencies'

    # Run Linting
    - script: |
        cd frontend
        npm run lint || echo "ESLint found issues, but continuing..."
      displayName: 'Run ESLint (Non-blocking)'
      continueOnError: true
    
    # Run TypeScript Check
    - script: |
        cd frontend
        npx tsc --noEmit
      displayName: 'TypeScript Check'

    # Run Jest Unit Tests
    - task: Npm@1
      displayName: 'Run Jest Unit Tests'
      inputs:
        command: 'custom'
        workingDir: 'frontend'
        verbose: false
        customCommand: 'test -- --ci --reporters=default --reporters=jest-junit'

    # Publish Jest Test Results
    - task: PublishTestResults@2
      displayName: 'Publish Jest Test Results'
      inputs:
        testResultsFiles: 'frontend/test-results/jest/results.xml'
        testResultsFormat: 'JUnit'
        failTaskOnFailedTests: true
        testRunTitle: 'Frontend Unit Tests'


    # Build React Application
    - script: |
        cd frontend
        npm run build
      displayName: 'Build React Application'
    
    # Publish Build Artifacts
    - task: PublishBuildArtifacts@1
      displayName: 'Publish Build Artifacts'
      inputs:
        pathToPublish: 'frontend/dist'
        artifactName: 'le-restaurant-frontend'
        publishLocation: 'Container'

# =============================================================================
# DEPLOYMENT STAGE
# =============================================================================
- stage: Deploy
  displayName: 'Deploy to Azure Static Web Apps'
  dependsOn: CI
  condition: succeeded()
  
  jobs:
  - job: DeployToAzure
    displayName: 'Deploy to Azure Static Web Apps'
    pool:
      vmImage: 'ubuntu-latest'
    
    steps:
    # Download Build Artifacts
    - task: DownloadBuildArtifacts@0
      displayName: 'Download Build Artifacts'
      inputs:
        buildType: 'current'
        downloadType: 'single'
        artifactName: 'le-restaurant-frontend'
        downloadPath: '$(System.ArtifactsDirectory)'
    
    # Deploy to Azure Static Web Apps
    - task: AzureStaticWebApp@0
      displayName: 'Deploy to Azure Static Web Apps'
      inputs:
        azure_subscription: '$(azureSubscription)'
        app_location: '$(System.ArtifactsDirectory)/le-restaurant-frontend'
        skip_app_build: true
        production_branch: 'main'